# ScriptMind AI — Cloudflare Workers deployment config
# Built with OpenNext.js (https://opennext.js.org/cloudflare)

name = "scriptmind-ai"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Assets directory (static files from Next.js build)
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
NEXT_PUBLIC_APP_URL = "https://scriptmind-ai.workers.dev"
